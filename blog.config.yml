# 博客配置文件
# 所有配置项都是可选的，不配置的项目不会显示

# 博客标题（可选，默认 "My Blog"）
title: "丛继晔的博客"

# 关于我部分（可选）
about:
  # avatar: "/images/avatar.png"  # 头像路径（可选）
  description: "软件工程师 · AI 工具开发者。喜欢地理，喜欢将复杂的东西简单化。"

# 友链列表（可选）
friends:
  - name: "GitHub"
    url: "https://github.com/AlphaZx-CJY"
  - name: "CSDN"
    url: "https://blog.csdn.net/weixin_40448140"
  - name: "个人主页"
    url: "https://www.congjiye.com/"

# 联系方式（可选）
social:
  github: "https://github.com/AlphaZx-CJY"
  email: "congjiye@outlook.com"

# RSS 自动生成配置（可选）
# enabled: 是否自动生成 RSS 文件（默认 false）
# filename: RSS 文件名（默认 feed.xml）
rss:
  enabled: true
  filename: "feed.xml"

# 评论系统（可选）
# 目前支持 giscus（基于 GitHub Discussions）
# 配置步骤：
# 1. 确保仓库已开启 Discussions
# 2. 访问 https://giscus.app 生成配置
# 3. 将配置填入下方
comments:
  provider: "giscus"
  repo: "AlphaZx-CJY/blog"
  repoId: "R_kgDOR6xOwg"
  category: "General"
  categoryId: "DIC_kwDOR6xOws4C6Jfu"
  mapping: "pathname"
  reactionsEnabled: true
  strict: false
